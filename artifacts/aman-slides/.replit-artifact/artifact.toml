kind = "slides"
previewPath = "/aman-slides/"
title = "أمان — عرض هاكاثون امد 26"
version = "1.0.0"
id = "artifacts/aman-slides"
router = "path"

[[services]]
name = "web"
paths = [ "/aman-slides/" ]
localPort = 22426

[services.development]
run = "pnpm --filter @workspace/aman-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aman-slides", "run", "build" ]
serve = "static"
publicDir = "artifacts/aman-slides/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22426"
BASE_PATH = "/aman-slides/"
